name: Build and Push Docker Images

on:
  workflow_dispatch:
    inputs:
      images:
        description: 'Services to build (comma-separated or "all")'
        required: true
        type: string
        default: 'all'
      platforms:
        description: 'Target platforms'
        type: choice
        options:
          - 'linux/amd64,linux/arm64'
          - 'linux/amd64'
          - 'linux/arm64'
        default: 'linux/amd64,linux/arm64'
      push:
        description: 'Push to ghcr.io'
        type: boolean
        default: true
      no_cache:
        description: 'Build without cache'
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # Parse input and create build matrix
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      build_2012: ${{ steps.set-matrix.outputs.build_2012 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse services and create matrix
        id: set-matrix
        run: |
          INPUT="${{ inputs.images }}"

          if [ "$INPUT" = "all" ]; then
            # Find all services with Dockerfiles
            ALL_SERVICES=$(find src/sciagent/services -maxdepth 2 -name "Dockerfile" -exec dirname {} \; | xargs -I{} basename {} | sort)
          else
            # Parse comma-separated list, trim whitespace
            ALL_SERVICES=$(echo "$INPUT" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' | sort -u)
          fi

          # openfoam-swak4foam-2012 has its own dedicated job (load + smoke + push).
          # Strip it from the matrix to avoid double-build, and emit a separate flag
          # so the dedicated job knows to run.
          if echo "$ALL_SERVICES" | grep -qx openfoam-swak4foam-2012; then
            BUILD_2012=true
          else
            BUILD_2012=false
          fi
          MATRIX_SERVICES=$(echo "$ALL_SERVICES" | grep -vx openfoam-swak4foam-2012 || true)

          SERVICES_JSON=$(echo "$MATRIX_SERVICES" | jq -R -s -c 'split("\n") | map(select(length > 0))')

          echo "Services to build (matrix): $SERVICES_JSON"
          echo "Dedicated openfoam-swak4foam-2012 job: $BUILD_2012"
          echo "matrix={\"service\":$SERVICES_JSON}" >> $GITHUB_OUTPUT
          echo "build_2012=$BUILD_2012" >> $GITHUB_OUTPUT

  # Build each service in parallel.
  # Skip when the matrix is empty (e.g. the only requested service was
  # openfoam-swak4foam-2012, which is handled by its dedicated job below) --
  # otherwise GitHub Actions marks an empty-matrix job as a workflow failure.
  build:
    needs: prepare
    if: ${{ fromJson(needs.prepare.outputs.matrix).service[0] != null }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
      max-parallel: 4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Dockerfile exists
        id: validate
        run: |
          SERVICE="${{ matrix.service }}"
          DOCKERFILE="src/sciagent/services/${SERVICE}/Dockerfile"

          if [ ! -f "$DOCKERFILE" ]; then
            echo "::error::Dockerfile not found: $DOCKERFILE"
            exit 1
          fi

          echo "dockerfile=$DOCKERFILE" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: src/sciagent/services
          file: ${{ steps.validate.outputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          no-cache: ${{ inputs.no_cache }}
          cache-from: ${{ inputs.no_cache && '' || format('type=gha,scope={0}', matrix.service) }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Job summary
        run: |
          echo "### ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Platforms:** \`${{ inputs.platforms }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest\`" >> $GITHUB_STEP_SUMMARY

  # Dedicated job for openfoam-swak4foam-2012: load + smoke + push.
  # Kept separate so the standard matrix `build` job above stays untouched.
  # The image is amd64-only (opencfd/openfoam-default:2012 has no arm64
  # manifest) so we ignore inputs.platforms and pin to linux/amd64.
  build-openfoam-swak4foam-2012:
    needs: prepare
    if: needs.prepare.outputs.build_2012 == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      SERVICE: openfoam-swak4foam-2012
      LOCAL_TAG: openfoam-swak4foam-2012:verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 1: build amd64 only, load into the local docker daemon.
      # Cache is written so the push step below does not rebuild from scratch.
      - name: Build (load for verification)
        uses: docker/build-push-action@v5
        with:
          context: src/sciagent/services
          file: src/sciagent/services/openfoam-swak4foam-2012/Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ env.LOCAL_TAG }}
          no-cache: ${{ inputs.no_cache }}
          cache-from: ${{ inputs.no_cache && '' || format('type=gha,scope={0}', env.SERVICE) }}
          cache-to: type=gha,mode=max,scope=${{ env.SERVICE }}

      # Step 2: run the embedded smoke test against the just-built image.
      # smoke.sh exercises every regression vector (real metisDecomp, groovyBC
      # $var + {patch_outlet} ABI, outletMappedUniformInletHeatAddition,
      # omegaWallFunction binomial2, all four buoyant solvers) in a single
      # decomposePar pass. The same script also runs as a Dockerfile RUN step
      # during the build above; running it here as a workflow step makes the
      # gate visible at the CI level and protects against any future Dockerfile
      # change that accidentally drops the in-image RUN.
      - name: Smoke test (verify before push)
        run: |
          docker run --rm "${LOCAL_TAG}" /usr/local/bin/sciagent-smoke

      # Step 3: push amd64 image to GHCR. cache-from reuses the buildx cache
      # written in step 1, so this is a manifest-publish, not a rebuild.
      - name: Push to GHCR
        if: ${{ inputs.push }}
        uses: docker/build-push-action@v5
        with:
          context: src/sciagent/services
          file: src/sciagent/services/openfoam-swak4foam-2012/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/openfoam-swak4foam-2012:latest
            ${{ env.IMAGE_PREFIX }}/openfoam-swak4foam-2012:${{ github.sha }}
          cache-from: type=gha,scope=${{ env.SERVICE }}
          cache-to: type=gha,mode=max,scope=${{ env.SERVICE }}

      - name: Job summary
        run: |
          echo "### openfoam-swak4foam-2012 (dedicated job)" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform:** \`linux/amd64\` (base manifest is amd64-only)" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ env.IMAGE_PREFIX }}/openfoam-swak4foam-2012:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Smoke test:** passed (real metisDecomp, groovyBC ABI, outletMappedUniformInletHeatAddition, omegaWallFunction binomial2, all four buoyant solvers)" >> $GITHUB_STEP_SUMMARY

  # Final summary
  summary:
    needs: [prepare, build, build-openfoam-swak4foam-2012]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Build Summary
        run: |
          echo "# Multi-Arch Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** \`${{ inputs.platforms }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Usage" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`python" >> $GITHUB_STEP_SUMMARY
          echo "# SkyPilot (cloud) - uses linux/amd64" >> $GITHUB_STEP_SUMMARY
          echo "compute.execute(service='<name>', backend='skypilot')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Local Mac - uses linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "compute.execute(service='<name>', backend='local')" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
