name: Build and Push Docker Images

on:
  workflow_dispatch:
    inputs:
      images:
        description: 'Services to build (comma-separated or "all")'
        required: true
        type: string
        default: 'all'
      platforms:
        description: 'Target platforms'
        type: choice
        options:
          - 'linux/amd64,linux/arm64'
          - 'linux/amd64'
          - 'linux/arm64'
        default: 'linux/amd64,linux/arm64'
      push:
        description: 'Push to ghcr.io'
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # Parse input and create build matrix
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse services and create matrix
        id: set-matrix
        run: |
          INPUT="${{ inputs.images }}"

          if [ "$INPUT" = "all" ]; then
            # Find all services with Dockerfiles
            SERVICES=$(find src/sciagent/services -maxdepth 2 -name "Dockerfile" -exec dirname {} \; | xargs -I{} basename {} | sort | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            # Parse comma-separated list, trim whitespace
            SERVICES=$(echo "$INPUT" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi

          echo "Services to build: $SERVICES"
          echo "matrix={\"service\":$SERVICES}" >> $GITHUB_OUTPUT

  # Build each service in parallel
  build:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
      max-parallel: 4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Validate Dockerfile exists
        id: validate
        run: |
          SERVICE="${{ matrix.service }}"
          DOCKERFILE="src/sciagent/services/${SERVICE}/Dockerfile"

          if [ ! -f "$DOCKERFILE" ]; then
            echo "::error::Dockerfile not found: $DOCKERFILE"
            exit 1
          fi

          echo "dockerfile=$DOCKERFILE" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: src/sciagent/services
          file: ${{ steps.validate.outputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Job summary
        run: |
          echo "### ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Platforms:** \`${{ inputs.platforms }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest\`" >> $GITHUB_STEP_SUMMARY

  # Final summary
  summary:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Build Summary
        run: |
          echo "# Multi-Arch Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** \`${{ inputs.platforms }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Usage" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`python" >> $GITHUB_STEP_SUMMARY
          echo "# SkyPilot (cloud) - uses linux/amd64" >> $GITHUB_STEP_SUMMARY
          echo "compute.execute(service='<name>', backend='skypilot')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Local Mac - uses linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "compute.execute(service='<name>', backend='local')" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
